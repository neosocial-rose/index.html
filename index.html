  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    html, body { width: 100%; overflow-x: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background:#fff; color:#0f172a; }
    
    /* Menü & Navigasyon */
    .glass-nav { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-bottom: 1px solid #f1f5f9; z-index: 50; }
    .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; color:#64748b; transition:0.2s; text-decoration: none; display: flex; align-items: center; }
    .nav-link:hover { color:#f43f5e; }
    
    /* Açılır Menüler (Hover Efekti) */
    .dropdown-trigger:hover .menu-dropdown { display: block; }
    .menu-dropdown { display:none; position:absolute; top:100%; left:50%; transform: translateX(-50%); background:#fff; border:1px solid #f1f5f9; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-radius: 12px; padding: 16px; min-width: 240px; z-index: 100; }
    
    /* Tasarım Elemanları */
    .hero-box { border:2px dashed #e2e8f0; border-radius: 1.5rem; background:#f8fafc; overflow:hidden; display:flex; align-items:center; justify-content:center; min-height:300px; }
    .hero-img { width:100%; height:100%; object-fit:cover; display:block; }
    .platform-card { border: 2px solid #f1f5f9; border-radius: 1.5rem; padding: 2rem; cursor: pointer; transition: all 0.3s; background: #fff; }
    .platform-card:hover { border-color:#f43f5e; transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(244, 63, 94, 0.1); }
    .crypto-card { border-color: #6ee7b7; background: linear-gradient(to bottom right, #ffffff, #ecfdf5); }
    
    /* Mobil Menü */
    #mobile-menu { display: none; position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px); background: #fff; z-index: 49; overflow-y: auto; border-top: 1px solid #f1f5f9; }
    #mobile-menu.active { display: block; }

    .lang-btn { font-size: 10px; font-weight: 800; padding: 6px 10px; border-radius: 8px; border:1px solid #e2e8f0; cursor:pointer; background:#fff; }
    .lang-btn.active { background:#f43f5e; color:#fff; border-color:#f43f5e; }
    
    .gemini-gradient-text { background: linear-gradient(90deg, #4285F4, #9B72CB, #D96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; }
    .modal.active { display:flex; }
  </style>
</head>
<body class="pt-32">
  <div id="notification" class="fixed bottom-5 right-5 bg-slate-900 text-white px-6 py-3 rounded-xl z-[10000] hidden font-bold text-xs uppercase"></div>

  <nav class="fixed top-0 w-full glass-nav h-20 flex items-center">
    <div class="max-w-7xl mx-auto px-4 w-full flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="index.html" class="text-xl font-black tracking-tighter text-slate-900 no-underline">NEOSOCIAL<span class="text-rose-500">_ROSE</span></a>
        <div class="hidden lg:flex items-center space-x-6">
          <a href="index.html" class="nav-link" data-tr="nav_home">Anasayfa</a>
          <a href="blog.html" class="nav-link" data-tr="nav_blog">Blog</a>
          <div class="relative dropdown-trigger h-20 flex items-center">
            <span class="nav-link cursor-pointer" data-tr="nav_apps">Uygulamalar</span>
            <div class="menu-dropdown">
              <p class="text-[10px] font-black text-rose-500 text-center mb-3">COMING SOON</p>
              <div class="flex justify-around"><i class="fab fa-apple text-2xl"></i><i class="fab fa-google-play text-2xl"></i></div>
            </div>
          </div>
          <div class="relative dropdown-trigger h-20 flex items-center">
            <span class="nav-link cursor-pointer" data-tr="nav_platform">Platform</span>
            <div class="menu-dropdown text-center">
              <p class="text-[10px] font-black mb-1 uppercase">Powered By</p>
              <p class="gemini-gradient-text">GEMINI 1.5 PRO</p>
            </div>
          </div>
          <a href="hakkimizda.html" class="nav-link" data-tr="nav_about">Hakkımızda</a>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden lg:flex gap-1">
          <button onclick="setLang('tr')" class="lang-btn" data-lang="tr">🇹🇷</button>
          <button onclick="setLang('en')" class="lang-btn" data-lang="en">🇬🇧</button>
          <button onclick="setLang('fr')" class="lang-btn" data-lang="fr">🇫🇷</button>
          <button onclick="setLang('de')" class="lang-btn" data-lang="de">🇩🇪</button>
          <button onclick="setLang('es')" class="lang-btn" data-lang="es">🇪🇸</button>
          <button onclick="setLang('pt')" class="lang-btn" data-lang="pt">🇵🇹</button>
        </div>
        <button onclick="loginWithGoogle()" id="login-btn" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">GİRİŞ</button>
        <button onclick="logoutGoogle()" id="logout-btn" class="hidden border px-4 py-2 rounded-xl text-[10px] font-black uppercase">ÇIKIŞ</button>
        <button class="lg:hidden text-2xl" onclick="toggleMobile()"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </nav>

  <div id="mobile-menu">
    <div class="flex flex-wrap justify-center gap-2 p-4 border-b">
      <button onclick="setLang('tr')" class="lang-btn" data-lang="tr">🇹🇷</button>
      <button onclick="setLang('en')" class="lang-btn" data-lang="en">🇬🇧</button>
      <button onclick="setLang('fr')" class="lang-btn" data-lang="fr">🇫🇷</button>
      <button onclick="setLang('de')" class="lang-btn" data-lang="de">🇩🇪</button>
    </div>
    <a href="index.html" class="block p-5 text-center font-bold border-b no-underline text-slate-900">Anasayfa</a>
    <a href="blog.html" class="block p-5 text-center font-bold border-b no-underline text-slate-900">Blog</a>
    <a href="hakkimizda.html" class="block p-5 text-center font-bold border-b no-underline text-slate-900">Hakkımızda</a>
  </div>

  <main class="max-w-7xl mx-auto px-4">
    <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">
      <div class="hero-box"><img src="hero.jpeg" alt="YouTube" class="hero-img"></div>
      <div class="ad-box bg-slate-50 rounded-[1.5rem] border flex items-center justify-center p-4">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1842835786064419" data-ad-slot="8094813402" data-ad-format="auto"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      <div class="hero-box"><img src="hero1.jpeg" alt="AI Content" class="hero-img"></div>
    </section>

    <h2 class="text-2xl font-black text-center mb-8 uppercase" data-tr="select_platform">Platform Seçin</h2>
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-16">
      <div class="platform-card" onclick="openGen('youtube')">
        <div class="flex justify-between items-center mb-4"><i class="fab fa-youtube text-red-600 text-4xl"></i><span id="badge-youtube" class="text-[10px] font-bold bg-rose-50 text-rose-500 px-2 py-1 rounded">2/2</span></div>
        <h3 class="font-black">YouTube</h3>
        <p class="text-xs text-slate-500 font-bold" data-tr="platform_youtube_desc">Başlık ve Hashtag Üretici</p>
      </div>
      <div class="platform-card crypto-card" onclick="openGen('crypto')">
        <div class="flex justify-between items-center mb-4"><i class="fab fa-bitcoin text-emerald-500 text-4xl"></i><span id="badge-crypto" class="text-[10px] font-bold bg-emerald-50 text-emerald-600 px-2 py-1 rounded">2/2</span></div>
        <h3 class="font-black text-emerald-600">Kripto Analiz</h3>
        <p class="text-xs text-slate-500 font-bold" data-tr="platform_crypto_desc">Anlık Trend & Tahminler</p>
      </div>
    </section>

    <section class="mb-20">
      <div class="hero-box w-full h-64"><img src="hero2.jpeg" alt="Social Media" class="hero-img"></div>
    </section>
  </main>

  <div id="gen-modal" class="modal">
    <div class="modal-content bg-white p-10 rounded-[2rem] max-w-lg w-full">
      <div class="flex justify-between mb-6"><h2 id="modal-title" class="font-black uppercase"></h2><button onclick="closeGen()" class="text-2xl">&times;</button></div>
      <input type="text" id="topic-input" class="pro-input mb-4" placeholder="Konu girin...">
      <button onclick="generate()" id="gen-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black">ÜRETİMİ BAŞLAT</button>
      <div id="result-box" class="mt-6 hidden bg-slate-50 p-6 rounded-2xl border">
        <p id="result-text" class="font-bold text-sm"></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
    const firebaseConfig = { apiKey: "AIzaSyDuRsR3gmen12f_I2EBbf0xND0dVWQGH_I", authDomain: "neosocial-rose.firebaseapp.com", projectId: "neosocial-rose", storageBucket: "neosocial-rose.firebasestorage.app", messagingSenderId: "909069196756", appId: "1:909069196756:web:db488838badee276f0ca41" };
    firebase.initializeApp(firebaseConfig);

    const T = {
      tr: { nav_home: "Anasayfa", nav_blog: "Blog", nav_apps: "Uygulamalar", nav_platform: "Platform", nav_about: "Hakkımızda", select_platform: "Platform Seçin", platform_youtube_desc: "Başlık ve Hashtag Üretici", platform_crypto_desc: "Anlık Trend & Tahminler" },
      en: { nav_home: "Home", nav_blog: "Blog", nav_apps: "Apps", nav_platform: "Platform", nav_about: "About", select_platform: "Select Platform", platform_youtube_desc: "Title & Hashtag Generator", platform_crypto_desc: "Real-time Crypto Analysis" },
      fr: { nav_home: "Accueil", nav_blog: "Blog", nav_apps: "Apps", nav_platform: "Plateforme", nav_about: "À propos", select_platform: "Plateforme", platform_youtube_desc: "Titres et Hashtags", platform_crypto_desc: "Analyse Crypto" },
      de: { nav_home: "Start", nav_blog: "Blog", nav_apps: "Apps", nav_platform: "Plattform", nav_about: "Über uns", select_platform: "Plattform wählen", platform_youtube_desc: "Titel & Hashtags", platform_crypto_desc: "Krypto-Analyse" },
      es: { nav_home: "Inicio", nav_blog: "Blog", nav_apps: "Apps", nav_platform: "Plataforma", nav_about: "Sobre", select_platform: "Plataforma", platform_youtube_desc: "Títulos y Hashtags", platform_crypto_desc: "Análisis Cripto" },
      pt: { nav_home: "Início", nav_blog: "Blog", nav_apps: "Apps", nav_platform: "Plataforma", nav_about: "Sobre", select_platform: "Selecionar", platform_youtube_desc: "Títulos e Hashtags", platform_crypto_desc: "Análise Cripto" }
    };

    let state = { lang: localStorage.getItem('nsr_lang') || 'tr', user: null, credits: {youtube:2, crypto:2} };

    function setLang(l) {
      state.lang = l; localStorage.setItem('nsr_lang', l);
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
      document.querySelectorAll('[data-tr]').forEach(e => { const k = e.dataset.tr; if(T[l][k]) e.innerText = T[l][k]; });
    }

    firebase.auth().onAuthStateChanged(u => {
      if(u) {
        state.user = u;
        document.getElementById('login-btn').classList.add('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('login-btn').innerText = u.displayName.split(' ')[0].toUpperCase();
      } else {
        state.user = null;
        document.getElementById('login-btn').classList.remove('hidden');
        document.getElementById('logout-btn').classList.add('hidden');
      }
    });

    function loginWithGoogle() { const p = new firebase.auth.GoogleAuthProvider(); firebase.auth().signInWithPopup(p); }
    function logoutGoogle() { firebase.auth().signOut(); }
    function toggleMobile() { document.getElementById('mobile-menu').classList.toggle('active'); }
    function openGen(p) { if(!state.user){ alert('Giriş yapmalısın dostum!'); return; } state.activeP = p; document.getElementById('modal-title').innerText = p; document.getElementById('gen-modal').classList.add('active'); }
    function closeGen() { document.getElementById('gen-modal').classList.remove('active'); }
    
    async function generate() {
        const input = document.getElementById('topic-input').value;
        if(!input) return;
        const btn = document.getElementById('gen-btn');
        btn.innerText = "ÜRETİLİYOR...";
        try {
            const r = await fetch('/api/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({topic:input, platform:state.activeP, lang:state.lang}) });
            const d = await r.json();
            document.getElementById('result-text').innerText = d.text;
            document.getElementById('result-box').classList.remove('hidden');
        } catch(e) { alert('Hata oluştu dostum.'); }
        btn.innerText = "ÜRETİMİ BAŞLAT";
    }

    window.onload = () => setLang(state.lang);
  </script>
</body>
</html>
